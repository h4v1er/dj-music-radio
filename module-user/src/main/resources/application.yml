# ===== 👤队员D - 用户中心 + 基础设施模块 =====
server:
  port: 8084

spring:
  application:
    name: module-user
  datasource:
    url: jdbc:mysql://localhost:3306/mall?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&characterEncoding=utf-8
    username: root
    password: ${MYSQL_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

user:
  jwt:
    secret: ${JWT_SECRET:dj_music_radio_user_secret_key_2026_min_32_chars}
    expire-ms: ${JWT_EXPIRE_MS:86400000}
