# ===== 👤队员A - 智能对话DJ模块 =====
server:
  port: 8081

spring:
  application:
    name: module-chat
  datasource:
    url: jdbc:mysql://localhost:3306/mall?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&characterEncoding=utf-8
    username: root
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: 1000
      initialization-fail-timeout: -1
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

# 天气 API（和风天气免费接口）
weather:
  api-key: ${QWEATHER_API_KEY:}
  # 和风天气控制台项目的 API Host。配置后会优先使用 https://${QWEATHER_API_HOST}/...
  api-host: ${QWEATHER_API_HOST:}
  # 兼容旧版/自定义地址；配置 api-host 时会被自动覆盖为同一 host 下的路径。
  weather-url: ${QWEATHER_WEATHER_URL:https://devapi.qweather.com/v7/weather/now}
  geo-url: ${QWEATHER_GEO_URL:https://geoapi.qweather.com/geo/v2/city/lookup}

# DeepSeek AI DJ chat. Keep keys in local environment, not in Git.
deepseek:
  api:
    key: ${DEEPSEEK_API_KEY:}
    url: ${DEEPSEEK_API_URL:https://api.deepseek.com/v1/chat/completions}
  model: ${DEEPSEEK_MODEL:deepseek-chat}
