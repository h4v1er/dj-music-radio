# ===== 👤队员A - 智能对话DJ模块 =====
server:
  port: 8081

spring:
  application:
    name: module-chat
  datasource:
    url: jdbc:mysql://localhost:3306/mall?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&characterEncoding=utf-8
    username: root
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: 1000
      initialization-fail-timeout: -1
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

# 天气 API（和风天气免费接口）
weather:
  api-key: ${QWEATHER_API_KEY:}
  weather-url: https://devapi.qweather.com/v7/weather/now
  geo-url: https://geoapi.qweather.com/geo/v2/city/lookup
