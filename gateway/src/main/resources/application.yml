# ===== Gateway 网关 =====
server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
      config:
        import-check:
          enabled: false
        enabled: false
    gateway:
      discovery:
        locator:
          enabled: true          # 自动根据服务名路由
          lower-case-service-id: true
      routes:
        # 对话服务 /chat/** → module-chat
        - id: chat-service
          uri: lb://module-chat
          predicates:
            - Path=/chat/**
        # 音乐服务 /music/** → module-music
        - id: music-service
          uri: lb://module-music
          predicates:
            - Path=/music/**
        # 推荐服务 /rec/** → module-rec
        - id: rec-service
          uri: lb://module-rec
          predicates:
            - Path=/rec/**
        # 用户服务 /user/** → module-user
        - id: user-service
          uri: lb://module-user
          predicates:
            - Path=/user/**

logging:
  level:
    org.springframework.cloud.gateway: info
