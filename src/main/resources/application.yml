# ==========================================
# 服务器配置
# ==========================================
server:
  port: 8080
  servlet:
    context-path: /

# ==========================================
# Spring 配置
# ==========================================
spring:
  application:
    name: mall

  # 数据源配置（Mac 上注意 SSL + 时区）
  datasource:
    url: jdbc:mysql://localhost:3306/mall?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&characterEncoding=utf-8
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver
    # 连接池（Spring Boot 3.x 默认 HikariCP）
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 30000

  # 日期格式化
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

# ==========================================
# MyBatis Plus 配置
# ==========================================
mybatis-plus:
  # 实体类扫描（多个包用逗号分隔）
  type-aliases-package: org.example.mall.entity
  # XML 映射文件位置
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    # 驼峰命名转换（user_name → userName）
    map-underscore-to-camel-case: true
    # SQL 日志输出到控制台
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      # 主键自增策略
      id-type: auto
      # 逻辑删除
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# ==========================================
# 日志级别
# ==========================================
logging:
  level:
    root: info
    org.example.mall: debug
    com.baomidou.mybatisplus: debug
