server:
  port: 8082

# DeepSeek AI 鎯呯华鍒嗘瀽锛堜笉閰嶇疆鍒欏洖閫€鍒板叧閿瘝鍖归厤锛?
deepseek:
  api:
    key: ${DEEPSEEK_API_KEY:}
    url: ${DEEPSEEK_API_URL:https://api.deepseek.com/v1/chat/completions}
  model: ${DEEPSEEK_MODEL:deepseek-chat}

spring:
  application:
    name: module-music
  datasource:
    url: jdbc:mysql://localhost:3306/dj_music_radio?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&characterEncoding=utf-8
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
